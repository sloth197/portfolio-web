server:
  port: ${PORT:8081}

spring:
  application:
    name: portfolio
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.local[.properties]

  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:20MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:50MB}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${DB_USERNAME:portfolio}
    password: ${DB_PASSWORD:portfolio}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://xhbt.dev,https://www.xhbt.dev}
  admin:
    username: ${APP_ADMIN_USERNAME:}
    password: ${APP_ADMIN_PASSWORD:}
    password-min-length: ${APP_ADMIN_PASSWORD_MIN_LENGTH:8}
    session-hours: ${APP_ADMIN_SESSION_HOURS:12}
    login-max-attempts: ${APP_ADMIN_LOGIN_MAX_ATTEMPTS:5}
    login-window-seconds: ${APP_ADMIN_LOGIN_WINDOW_SECONDS:300}
    login-lock-seconds: ${APP_ADMIN_LOGIN_LOCK_SECONDS:900}
  crm:
    username: ${APP_CRM_USERNAME:}
    password: ${APP_CRM_PASSWORD:}
  auth:
    enabled: ${APP_AUTH_ENABLED:false}
    public-gate-enabled: ${APP_AUTH_PUBLIC_GATE_ENABLED:false}
    cookie-name: PORTFOLIO_SESSION
    cookie-secure: ${APP_AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
    session-hours: ${APP_AUTH_SESSION_HOURS:12}
    code-ttl-minutes: ${APP_AUTH_CODE_TTL_MINUTES:5}
    code-max-attempts: ${APP_AUTH_CODE_MAX_ATTEMPTS:5}
    max-requests-per-hour: ${APP_AUTH_MAX_REQUESTS_PER_HOUR:10}
    kakao-webhook-url: ${APP_AUTH_KAKAO_WEBHOOK_URL:}
    pass-webhook-url: ${APP_AUTH_PASS_WEBHOOK_URL:}
  upload:
    provider: ${APP_UPLOAD_PROVIDER:auto}
    dir: ${APP_UPLOAD_DIR:uploads}
    supabase:
      url: ${APP_UPLOAD_SUPABASE_URL:}
      bucket: ${APP_UPLOAD_SUPABASE_BUCKET:}
      service-role-key: ${APP_UPLOAD_SUPABASE_SERVICE_ROLE_KEY:}
  migration:
    rewrite-legacy-asset-links:
      enabled: ${APP_MIGRATION_REWRITE_LEGACY_ASSET_LINKS_ENABLED:true}
